<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="login-container">
        <div class="glow-effect"></div>
        <form class="login-form" id="recoveryForm">
            <h2>Recuperar Acceso</h2>
            <p class="subtitle">Ingresa tu email registrado para recibir tu contraseña</p>
            
            <div id="connectionStatus" class="connection-status">
                <span class="status-dot"></span>
                <span class="status-text">Verificando servidor...</span>
            </div>

            <div class="input-group">
                <label for="recoveryEmail">Correo Electrónico</label>
                <div class="input-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        class="input-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <input type="email" id="recoveryEmail" name="recoveryEmail" placeholder="ejemplo@correo.com" required>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="recoveryBtn">
                <span>Enviar Solicitud</span>
                <div class="loader" id="loader"></div>
            </button>

            <div style="margin-top: 1.5rem; text-align: center;">
                <a href="index.html" class="forgot-password">Volver al inicio de sesión</a>
            </div>
            
            <div id="recoveryMessage" class="subtitle" style="margin-top: 1.5rem; display: none; color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 10px; border-radius: 8px;">
                <!-- Password will be shown here for simulation -->
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
